{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Threat Intelligence IOC Triage Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark border-bottom border-success-subtle">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">IOC Triage</a>
        <div class="navbar-nav">
            <a class="nav-link" href="{% url 'home' %}">Upload</a>
            <a class="nav-link" href="{% url 'results' %}">Results</a>
            <a class="nav-link" href="{% url 'report' %}">Report</a>
        </div>
    </div>
</nav>
<main class="container-fluid py-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} shadow-sm">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
