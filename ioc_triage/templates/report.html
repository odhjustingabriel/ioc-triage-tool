{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
    <div>
        <h1 class="h3 mb-1">Threat Intelligence Report</h1>
        <p class="text-secondary mb-0">Markdown preview generated from all saved IOC records.</p>
    </div>
    <div class="btn-group">
        <a class="btn btn-success" href="?download=markdown">Download Markdown</a>
        <a class="btn btn-outline-success" href="?download=pdf">Download PDF</a>
    </div>
</div>
<div class="report-preview card card-body">
    <pre>{{ markdown }}</pre>
</div>
{% endblock %}
